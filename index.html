<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Séminaire Finance 2025</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #1a237e; min-height: 100vh; }
    #page-accueil { display: flex; flex-direction: column; align-items: center; padding: 60px 20px; }
    #page-accueil h1 { color: white; font-size: 2.2rem; font-weight: 800; text-align: center; margin-bottom: 40px; line-height: 1.3; }
    .carte-formulaire { background: white; border-radius: 16px; padding: 30px 24px; width: 100%; max-width: 420px; box-shadow: 0 8px 32px rgba(0,0,0,0.2); }
    .champ { width: 100%; padding: 16px; border: 2px solid #e0e0e0; border-radius: 8px; font-size: 1rem; margin-bottom: 16px; outline: none; transition: border-color 0.2s; }
    .champ:focus { border-color: #1a237e; }
    .bouton-principal { width: 100%; padding: 18px; background: #1565c0; color: white; border: none; border-radius: 10px; font-size: 1.1rem; font-weight: 700; cursor: pointer; }
    .bouton-principal:hover { background: #0d47a1; }
    #message-erreur { color: #c62828; margin-top: 12px; font-size: 0.9rem; text-align: center; }
    #page-planning { display: none; padding: 20px; }
    .entete-planning { background: white; border-radius: 14px; padding: 20px; margin-bottom: 20px; display: flex; align-items: center; justify-content: space-between; }
    .entete-planning h2 { color: #1a237e; font-size: 1.3rem; font-weight: 800; }
    .sous-titre { color: #1565c0; font-weight: 700; font-size: 1rem; }
    .logo-seminaire { text-align: center; color: #1a237e; font-size: 0.7rem; font-weight: 800; border: 2px solid #1a237e; border-radius: 8px; padding: 6px 10px; line-height: 1.4; }
    .bloc-activite { background: white; border-radius: 14px; margin-bottom: 14px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
    .entete-activite { background: #1a237e; color: white; padding: 12px 16px; display: flex; justify-content: space-between; align-items: center; }
    .nom-activite { font-weight: 800; font-size: 1rem; }
    .infos-droite { text-align: right; font-size: 0.9rem; }
    .lieu-activite { font-style: italic; color: #90caf9; }
    .heure-activite { font-weight: 800; font-size: 1.1rem; }
    .corps-activite { padding: 14px 16px; }
    .tag-groupe { display: inline-block; background: #e3f2fd; color: #1565c0; border-radius: 6px; padding: 4px 10px; font-size: 0.85rem; font-weight: 700; margin-bottom: 8px; }
    .detail-item { color: #333; font-size: 0.95rem; padding: 4px 0 4px 16px; position: relative; }
    .detail-item::before { content: "•"; position: absolute; left: 4px; color: #1565c0; }
    .fin-journee { color: white; text-align: center; font-style: italic; padding: 20px; font-size: 0.95rem; opacity: 0.8; }
    .bouton-retour { background: rgba(255,255,255,0.15); color: white; border: 2px solid white; border-radius: 8px; padding: 10px 20px; cursor: pointer; font-size: 0.9rem; margin-bottom: 16px; display: block; }
  </style>
</head>
<body>

<div id="page-accueil">
  <h1>Votre agenda<br>personnalisé :</h1>
  <div class="carte-formulaire">
    <input class="champ" id="prenom" type="text" placeholder="Prénom" />
    <input class="champ" id="nom" type="text" placeholder="Nom" />
    <button class="bouton-principal" onclick="chercherPlanning()">Voir mon planning</button>
    <p id="message-erreur"></p>
  </div>
</div>

<div id="page-planning">
  <button class="bouton-retour" onclick="retourAccueil()">← Retour</button>
  <div class="entete-planning">
    <div>
      <div class="sous-titre">Séminaire Finance 2025</div>
      <h2 id="nom-participant"></h2>
    </div>
    <div class="logo-seminaire">SÉMINAIRE<br>FINANCE<br>26 JUIN 2025<br>✈ SAFRAN</div>
  </div>
  <div id="contenu-planning"></div>
  <p class="fin-journee">Fin de la journée à 17h30</p>
</div>

<script>

// ============================================================
//  ✏️  MODIFIEZ UNIQUEMENT CETTE SECTION AVEC VOS DONNÉES
// ============================================================
const PLANNING = [
  { prenom: "Marjorie", nom: "Clement", heure: "8h00",  activite: "Introduction",        lieu: "Salle A",  groupe: "",        details: "Café d'accueil" },
  { prenom: "Marjorie", nom: "Clement", heure: "10h00", activite: "Présentation Lumen",  lieu: "Salle B",  groupe: "Groupe 1", details: "" },
  { prenom: "Pierre",   nom: "Dupont",  heure: "8h00",  activite: "Introduction",        lieu: "Salle A",  groupe: "",        details: "Café d'accueil" },
  // Ajoutez vos lignes ici en suivant le même format...
];
// ============================================================

function normaliser(txt) {
  return (txt || '').toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '').trim();
}

function chercherPlanning() {
  const prenom = normaliser(document.getElementById('prenom').value);
  const nom = normaliser(document.getElementById('nom').value);
  if (!prenom || !nom) {
    document.getElementById('message-erreur').textContent = 'Veuillez entrer votre prénom et votre nom.';
    return;
  }
  const resultats = PLANNING.filter(l => normaliser(l.prenom) === prenom && normaliser(l.nom) === nom);
  if (resultats.length === 0) {
    document.getElementById('message-erreur').textContent = 'Aucun planning trouvé. Vérifiez l\'orthographe de votre nom.';
    return;
  }
  afficherPlanning(resultats);
}

function afficherPlanning(activites) {
  document.getElementById('nom-participant').textContent = activites[0].prenom + ' ' + activites[0].nom.toUpperCase();
  let html = '';
  activites.forEach(a => {
    html += `
      <div class="bloc-activite">
        <div class="entete-activite">
          <div class="nom-activite">${a.activite}</div>
          <div class="infos-droite">
            <div class="lieu-activite">${a.lieu}</div>
            <div class="heure-activite">${a.heure}</div>
          </div>
        </div>
        <div class="corps-activite">
          ${a.groupe ? `<span class="tag-groupe">${a.groupe}</span>` : ''}
          ${a.details ? `<div class="detail-item">${a.details}</div>` : ''}
        </div>
      </div>`;
  });
  document.getElementById('contenu-planning').innerHTML = html;
  document.getElementById('page-accueil').style.display = 'none';
  document.getElementById('page-planning').style.display = 'block';
  window.scrollTo(0, 0);
}

function retourAccueil() {
  document.getElementById('page-accueil').style.display = 'flex';
  document.getElementById('page-planning').style.display = 'none';
  document.getElementById('message-erreur').textContent = '';
}

document.addEventListener('keydown', e => { if (e.key === 'Enter') chercherPlanning(); });
</script>
</body>
</html>
