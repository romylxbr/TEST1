<body>

<!-- PAGE ACCUEIL -->
<div id="page-accueil">

  <h1>Votre agenda<br>personnalisé :</h1>

  <form onsubmit="chercherPlanning(); return false;">

    <input
      id="prenom"
      type="text"
      placeholder="Prénom"
    />

    <input
      id="nom"
      type="text"
      placeholder="Nom"
    />

    <button type="submit">
      Voir mon planning
    </button>

    <p id="message-erreur"></p>

  </form>

</div>

<!-- PAGE PLANNING -->
<div id="page-planning" style="display:none;">

  <button
    onclick="retourAccueil()"
    style="width:auto; margin-bottom:1em;"
  >
    ← Retour
  </button>

  <div id="planning">

    <div class="plan-header">

      <div class="plan-titles">
        <h2>Séminaire Finance 2025</h2>
        <h3 id="nom-participant"></h3>
      </div>

      <div class="plan-logo">
        SÉMINAIRE<br>
        FINANCE<br>
        26 JUIN 2025<br>
        ✈ SAFRAN
      </div>

    </div>

    <div id="contenu-planning"></div>

    <p class="session-footer">
      Fin de la journée à 17h30
    </p>

  </div>

</div>

<script>

  let donneesCSV = [];

  fetch('planning.csv')
    .then(response => response.text())
    .then(texte => {
      donneesCSV = parseCSV(texte);

      console.log("CSV chargé :", donneesCSV);
    })
    .catch(error => {
      console.error("Erreur chargement CSV :", error);

      document.getElementById('message-erreur').textContent =
        "Impossible de charger le fichier planning.csv";
    });

  // NORMALISATION TEXTE
  function normaliser(txt) {

    return (txt || '')
      .toLowerCase()
      .normalize('NFD')
      .replace(/[\u0300-\u036f]/g, '')
      .trim();
  }

  // PARSE CSV
  function parseCSV(texte) {

    const lignes = texte.trim().split('\n');

    const entetes = lignes[0]
      .split(';')
      .map(e => normaliser(
        e.replace(/"/g, '')
      ));

    return lignes.slice(1).map(ligne => {

      const valeurs = ligne
        .split(';')
        .map(v => v.trim().replace(/"/g, ''));

      const obj = {};

      entetes.forEach((entete, index) => {
        obj[entete] = valeurs[index] || '';
      });

      return obj;
    });
  }

  // RECHERCHE
  function chercherPlanning() {

    const prenom = normaliser(
      document.getElementById('prenom').value
    );

    const nom = normaliser(
      document.getElementById('nom').value
    );

    if (!prenom || !nom) {

      document.getElementById('message-erreur').textContent =
        'Veuillez entrer votre prénom et votre nom.';

      return;
    }

    const resultats = donneesCSV.filter(ligne =>

      normaliser(ligne.prenom) === prenom &&
      normaliser(ligne.nom) === nom

    );

    if (resultats.length === 0) {

      document.getElementById('message-erreur').textContent =
        "Aucun planning trouvé.";

      return;
    }

    afficherPlanning(resultats);
  }

  // AFFICHAGE
  function afficherPlanning(activites) {

    const prenomAffiche = activites[0].prenom;
    const nomAffiche = activites[0].nom.toUpperCase();

    document.getElementById('nom-participant').textContent =
      prenomAffiche + ' ' + nomAffiche;

    let html = '';

    activites.forEach(a => {

      html += `
        <div class="session">

          <div class="session-bar">

            <span class="session-title">
              ${a.activite}
            </span>

            ${a.lieu ? `
              <span class="session-location">
                ${a.lieu}
              </span>
            ` : ''}

            ${a.heure ? `
              <span class="session-time">
                ${a.heure}
              </span>
            ` : ''}

          </div>

          <ul class="session-body">

            ${a.groupe ? `
              <li>
                <span class="group-number">
                  ${a.groupe}
                </span>
              </li>
            ` : ''}

          </ul>

        </div>
      `;
    });

    document.getElementById('contenu-planning').innerHTML = html;

    document.getElementById('page-accueil').style.display = 'none';

    document.getElementById('page-planning').style.display = 'block';

    window.scrollTo(0, 0);
  }

  // RETOUR
  function retourAccueil() {

    document.getElementById('page-accueil').style.display = 'block';

    document.getElementById('page-planning').style.display = 'none';

    document.getElementById('message-erreur').textContent = '';
  }

</script>

</body>
</html>
